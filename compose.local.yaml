services:
  postgres:
    image: postgres:16-alpine
    container_name: lifekeeper-postgres
    environment:
      POSTGRES_DB: lifekeeper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - lifekeeper-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lifekeeper"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lifekeeper-redis
    ports:
      - "6379:6379"
    volumes:
      - lifekeeper-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  lifekeeper-postgres-data:
  lifekeeper-redis-data: