<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- body -->
  <rect x="6" y="5" width="68" height="112" rx="5" fill="#d8dce0" stroke="#808898"/>
  <!-- fridge / freezer divider -->
  <line x1="9" y1="42" x2="71" y2="42" stroke="#9098a8" stroke-width="2"/>
  <!-- freezer door handle -->
  <rect x="54" y="14" width="6" height="20" rx="3" fill="#a0a8b8" stroke="#7080a0"/>
  <!-- fridge door handle -->
  <rect x="54" y="52" width="6" height="30" rx="3" fill="#a0a8b8" stroke="#7080a0"/>
  <!-- door gap lines -->
  <line x1="9" y1="8" x2="9" y2="112" stroke="#9098a8" stroke-width="1"/>
  <!-- vent at top -->
  <line x1="15" y1="112" x2="65" y2="112" stroke="#9098a8" stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>
