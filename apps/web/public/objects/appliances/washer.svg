  <circle cx="22" cy="21" r="6" fill="#a0aac0" stroke="#8090b0" stroke-width="1.5"/>
  <circle cx="58" cy="21" r="6" fill="#a0aac0" stroke="#8090b0" stroke-width="1.5"/>
  <rect x="34" y="16" width="12" height="10" rx="3" fill="#b0b8cc" stroke="#8090b0" stroke-width="1.5"/>
