  <!-- rear swingarm -->
  <line x1="18" y1="34" x2="14" y2="44" stroke="#4a6080" stroke-width="3"/>
  <!-- handlebars -->
  <path d="M70 20 L78 16 M70 20 L78 24" stroke="#4a6080" stroke-width="2"/>
  <!-- wheels -->
  <circle cx="14" cy="46" r="12" fill="#223" stroke="#334" stroke-width="2"/>
  <circle cx="14" cy="46" r="6" fill="#667" stroke="#556"/>
  <circle cx="86" cy="46" r="12" fill="#223" stroke="#334" stroke-width="2"/>
  <circle cx="86" cy="46" r="6" fill="#667" stroke="#556"/>
</svg>
