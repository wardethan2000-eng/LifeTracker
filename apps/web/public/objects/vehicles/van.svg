<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 65" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- body (tall box van) -->
  <rect x="5" y="10" width="110" height="42" rx="4" fill="#c8cfe0" stroke="#4a6080"/>
  <!-- windshield -->
  <rect x="85" y="14" width="26" height="20" rx="3" fill="#d8eeff" stroke="#6090b0" stroke-width="1.5"/>
  <!-- side door lines -->
  <line x1="40" y1="12" x2="40" y2="50" stroke="#6080a0" stroke-width="1.5"/>
  <line x1="75" y1="12" x2="75" y2="50" stroke="#6080a0" stroke-width="1.5"/>
  <!-- rear door handle -->
  <rect x="10" y="28" width="6" height="12" rx="2" fill="none" stroke="#6080a0" stroke-width="1.5"/>
  <!-- wheels -->
  <circle cx="28" cy="52" r="10" fill="#334" stroke="#334"/>
  <circle cx="28" cy="52" r="5.5" fill="#778" stroke="#556"/>
  <circle cx="92" cy="52" r="10" fill="#334" stroke="#334"/>
  <circle cx="92" cy="52" r="5.5" fill="#778" stroke="#556"/>
  <!-- headlight -->
  <rect x="110" y="28" width="5" height="8" rx="2" fill="#ffe080" stroke="#c0a000" stroke-width="1"/>
</svg>
