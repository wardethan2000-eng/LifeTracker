<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- seat cushion -->
  <rect x="15" y="42" width="90" height="22" rx="6" fill="#c8a870" stroke="#8a6040"/>
  <!-- back rest -->
  <rect x="15" y="20" width="90" height="26" rx="6" fill="#d0b080" stroke="#8a6040"/>
  <!-- left arm -->
