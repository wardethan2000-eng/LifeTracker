<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- garden bed outline -->
  <rect x="4" y="4" width="152" height="72" rx="6" fill="#5a3a20" stroke="#3d2810"/>
  <!-- soil -->
  <rect x="10" y="10" width="140" height="60" rx="3" fill="#8a6530" stroke="none"/>
  <!-- plant rows -->
  <line x1="20" y1="20" x2="20" y2="60" stroke="#6aaa50" stroke-width="3" opacity="0.6"/>
  <line x1="45" y1="20" x2="45" y2="60" stroke="#6aaa50" stroke-width="3" opacity="0.6"/>
  <line x1="70" y1="20" x2="70" y2="60" stroke="#6aaa50" stroke-width="3" opacity="0.6"/>
  <line x1="95" y1="20" x2="95" y2="60" stroke="#6aaa50" stroke-width="3" opacity="0.6"/>
  <line x1="120" y1="20" x2="120" y2="60" stroke="#6aaa50" stroke-width="3" opacity="0.6"/>
  <line x1="145" y1="20" x2="145" y2="60" stroke="#6aaa50" stroke-width="3" opacity="0.6"/>
  <!-- plant dots -->
  <circle cx="20" cy="25" r="4" fill="#7dbd60" stroke="none"/>
  <circle cx="45" cy="30" r="4" fill="#7dbd60" stroke="none"/>
  <circle cx="70" cy="25" r="4" fill="#7dbd60" stroke="none"/>
  <circle cx="95" cy="28" r="4" fill="#7dbd60" stroke="none"/>
  <circle cx="120" cy="25" r="4" fill="#7dbd60" stroke="none"/>
  <circle cx="145" cy="30" r="4" fill="#7dbd60" stroke="none"/>
</svg>
